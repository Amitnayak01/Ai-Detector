version: '3.9'

services:
  mongo:
    image: mongo:7
    container_name: ai-detector-mongo
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongo-data:/data/db
    environment:
      MONGO_INITDB_DATABASE: ai-detector

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: ai-detector-server
    restart: unless-stopped
    ports:
      - '4000:4000'
    env_file:
      - ./server/.env
    environment:
      MONGODB_URI: mongodb://mongo:27017/ai-detector
    depends_on:
      - mongo

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: ai-detector-client
    restart: unless-stopped
    ports:
      - '5173:80'
    depends_on:
      - server

volumes:
  mongo-data:
